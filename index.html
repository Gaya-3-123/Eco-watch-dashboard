<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Watch Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #eef2f3; padding: 20px; }
        .dashboard { background: white; padding: 30px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid #2e7d32; }
        h1 { color: #2c3e50; margin-bottom: 20px; }
        .data-container { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .data-box { background: #f9f9f9; padding: 20px; border-radius: 10px; min-width: 150px; border: 1px solid #ddd; }
        .label { font-size: 14px; color: #7f8c8d; text-transform: uppercase; }
        .value { font-size: 32px; font-weight: bold; color: #2e7d32; margin-top: 10px; }
        .input-section { margin-top: 30px; padding: 20px; background: #f1f8e9; border-radius: 10px; border: 1px dashed #2e7d32; }
        input { padding: 12px; margin: 10px 5px; border: 1px solid #ccc; border-radius: 5px; width: 180px; }
        button { padding: 12px 25px; background: #2e7d32; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #1b5e20; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>Eco-Watch Real-Time Dashboard</h1>
        
        <div class="data-container">
            <div class="data-box">
                <div class="label">Temperature</div>
                <div class="value"><span id="tempDisplay">28</span>°C</div>
            </div>
            <div class="data-box">
                <div class="label">Humidity</div>
                <div class="value"><span id="humidityDisplay">65</span>%</div>
            </div>
        </div>

        <div class="input-section">
            <h3>Update Environment Data</h3>
            <input type="number" id="tempInput" placeholder="Enter Temp (°C)">
            <input type="number" id="humidityInput" placeholder="Enter Humidity (%)">
            <br>
            <button onclick="updateDashboard()">Update Live</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
