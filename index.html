<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Vaniyambadi Dashboard</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #0f172a; color: #f8fafc; text-align: center; padding-top: 50px; }
        .box { background: #1e293b; padding: 20px; border-radius: 15px; display: inline-block; width: 300px; margin: 10px; border: 1px solid #334155; }
        .value { font-size: 2.5em; font-weight: bold; color: #38bdf8; }
        .label { color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🌍 Live Atmosphere Monitor</h1>
    <div class="box">
        <div id="temp" class="value">Loading...</div>
        <div class="label">Temperature (Vaniyambadi)</div>
    </div>
    <div class="box">
        <div id="members" class="value">0</div>
        <div class="label">Members in Area</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
